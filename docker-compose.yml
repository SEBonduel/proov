services:
  db:
    image: postgres:17-alpine
    container_name: proov-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: proov
      POSTGRES_PASSWORD: proov
      POSTGRES_DB: proov
    ports:
      - "5433:5432"
    volumes:
      - proov-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U proov -d proov"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  proov-db-data:
